# ─── Root Mutation ────────────────────────────────────────────────────────────

type Mutation {
  # Compartments
  createCompartment(compartmentId: String!, name: String!, description: String): Compartment
  updateCompartment(compartmentId: String!, displayName: String, description: String): Compartment
  deleteCompartment(compartmentId: String!): Boolean

  # Users
  createUser(compartmentId: String!, name: String!, description: String, email: String): User
  updateUser(userId: String!, description: String, email: String): User
  deleteUser(userId: String!): Boolean

  # Groups and Policies
  createGroup(compartmentId: String!, name: String!, description: String): Group
  createPolicy(compartmentId: String!, name: String!, description: String!, statements: [String!]!): Policy

  # VCN and Networking
  createVCN(compartmentId: String!, cidrBlock: String!, displayName: String): VCN
  createSubnet(compartmentId: String!, vcnId: String!, cidrBlock: String!, displayName: String): Subnet
  createInternetGateway(compartmentId: String!, vcnId: String!, isEnabled: Boolean!, displayName: String): InternetGateway

  # Compute
  launchInstance(compartmentId: String!, availabilityDomain: String!, shape: String!, imageId: String, subnetId: String!, displayName: String): Instance
  terminateInstance(instanceId: String!, preserveBootVolume: Boolean): Boolean
  instanceAction(instanceId: String!, action: String!): Instance

  # Storage
  createVolume(compartmentId: String!, availabilityDomain: String!, displayName: String, sizeInGBs: Int): DataVolume
  deleteVolume(volumeId: String!): Boolean
  createBucket(namespaceName: String!, compartmentId: String!, name: String!, publicAccessType: String): Bucket
  deleteBucket(namespaceName: String!, bucketName: String!): Boolean

  # Database
  createAutonomousDatabase(compartmentId: String!, dbName: String!, cpuCoreCount: Int!, dataStorageSizeInTBs: Int!, adminPassword: String!, dbWorkload: String): AutonomousDatabase
  deleteAutonomousDatabase(autonomousDatabaseId: String!): Boolean

  # Container
  createCluster(compartmentId: String!, name: String!, vcnId: String!, kubernetesVersion: String!): Cluster
  deleteCluster(clusterId: String!): Boolean
  createNodePool(compartmentId: String!, clusterId: String!, name: String!, nodeShape: String!, kubernetesVersion: String!): NodePool

  # Functions
  createFunctionApplication(compartmentId: String!, displayName: String!, subnetIds: [String!]!): FunctionApplication
  createFunction(applicationId: String!, displayName: String!, image: String!, memoryInMBs: Int!, timeoutInSeconds: Int): Function

  # Messaging
  createStream(compartmentId: String!, name: String!, partitions: Int!): Stream
  createQueue(compartmentId: String!, displayName: String!): Queue
  createNotificationTopic(compartmentId: String!, name: String!, description: String): NotificationTopic
  createSubscription(topicId: String!, compartmentId: String!, protocol: String!, endpoint: String!): Subscription

  # Governance
  createBudget(compartmentId: String!, amount: Float!, resetPeriod: String!, displayName: String!): Budget
  createTag(tagNamespaceId: String!, name: String!, description: String): Tag
  createTagNamespace(compartmentId: String!, name: String!, description: String): TagNamespace
}
