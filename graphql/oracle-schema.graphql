  identityDomain(domainId: String!): IdentityDomain
  identityDomains(compartmentId: String!): [IdentityDomain]
  dynamicGroup(dynamicGroupId: String!): DynamicGroup
  dynamicGroups(compartmentId: String!): [DynamicGroup]

  # Networking
  vcn(vcnId: String!): VCN
  vcns(compartmentId: String!): [VCN]
  subnet(subnetId: String!): Subnet
  subnets(compartmentId: String!, vcnId: String): [Subnet]
  internetGateway(igId: String!): InternetGateway
  internetGateways(compartmentId: String!, vcnId: String!): [InternetGateway]
  routeTable(rtId: String!): RouteTable
  routeTables(compartmentId: String!, vcnId: String!): [RouteTable]
  securityList(securityListId: String!): SecurityList
  securityLists(compartmentId: String!, vcnId: String!): [SecurityList]
  publicIp(publicIpId: String!): PublicIp
  publicIps(compartmentId: String!, scope: String!): [PublicIp]
  drg(drgId: String!): DRG
  drgs(compartmentId: String!): [DRG]
  ipsecVpn(ipscId: String!): IPSecVPN
  ipsecVpns(compartmentId: String!): [IPSecVPN]

  # Compute
  instance(instanceId: String!): Instance
  instances(compartmentId: String!, availabilityDomain: String): [Instance]
  image(imageId: String!): Image
  images(compartmentId: String!): [Image]
  shape(shape: String!): Shape
  shapes(compartmentId: String!): [Shape]
  bootVolume(bootVolumeId: String!): BootVolume
  bootVolumes(compartmentId: String!, availabilityDomain: String!): [BootVolume]

  # Storage
  volume(volumeId: String!): DataVolume
  volumes(compartmentId: String!): [DataVolume]
  volumeBackup(volumeBackupId: String!): VolumeBackup
  volumeBackups(compartmentId: String!): [VolumeBackup]
  fileSystem(fileSystemId: String!): FileSystem
  fileSystems(compartmentId: String!, availabilityDomain: String!): [FileSystem]
  bucket(namespaceName: String!, bucketName: String!): Bucket
  buckets(namespaceName: String!, compartmentId: String!): [Bucket]

  # Database
  autonomousDatabase(autonomousDatabaseId: String!): AutonomousDatabase
  autonomousDatabases(compartmentId: String!): [AutonomousDatabase]
  database(databaseId: String!): Database
  databases(dbHomeId: String!): [Database]
  dbSystem(dbSystemId: String!): DatabaseSystem
  dbSystems(compartmentId: String!): [DatabaseSystem]
  mySQLDbSystem(dbSystemId: String!): MySQLDbSystem
  mySQLDbSystems(compartmentId: String!): [MySQLDbSystem]

  # Container and Serverless
  cluster(clusterId: String!): Cluster
  clusters(compartmentId: String!): [Cluster]
  nodePool(nodePoolId: String!): NodePool
  nodePools(clusterId: String!): [NodePool]
  functionApplication(applicationId: String!): FunctionApplication
  functionApplications(compartmentId: String!): [FunctionApplication]
  function(functionId: String!): Function
  functions(applicationId: String!): [Function]
  apiGateway(gatewayId: String!): APIGateway
  apiGateways(compartmentId: String!): [APIGateway]

  # Messaging
  stream(streamId: String!): Stream
  streams(compartmentId: String!): [Stream]
  queue(queueId: String!): Queue
  queues(compartmentId: String!): [Queue]
  notificationTopic(topicId: String!): NotificationTopic
  notificationTopics(compartmentId: String!): [NotificationTopic]

  # Observability
  alarm(alarmId: String!): Alarm
  alarms(compartmentId: String!): [Alarm]
  alarmStatuses(compartmentId: String!): [AlarmStatus]
  logGroup(logGroupId: String!): LogGroup
  logGroups(compartmentId: String!): [LogGroup]
  log(logGroupId: String!, logId: String!): Log
  logs(logGroupId: String!): [Log]

